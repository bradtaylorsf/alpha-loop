type: step
step: learn
eval_method: llm-judge
status: ready
checks:
  - type: llm_judge
    model: claude-haiku-4-5
    rubric: |
      Evaluate whether the learning output correctly identifies ESM/CJS module format mismatch
      as the root cause of the test failures. Score 1-5 based on:
      - Score 5: Learning explicitly identifies ESM/CJS module format incompatibility as the root
        cause, and suggests a prevention strategy (e.g., ensure consistent module format in
        config, use .mjs/.cjs extensions appropriately, check package.json "type" field)
      - Score 4: Learning identifies module format as the root cause without a clear prevention
        strategy
      - Score 3: Learning mentions ERR_REQUIRE_ESM but frames it as a one-off error rather than
        a systemic pattern to learn from
      - Score 2: Learning identifies tests failed but attributes it to a vague configuration issue
      - Score 1: Learning does not identify module format as the root cause
    min_score: 4
