# Alpha Loop configuration
# This repo uses itself to build itself

repo: bradtaylorsf/alpha-loop
repo_owner: bradtaylorsf
project: 2
agent: claude
base_branch: master
label: ready
test_command: pnpm test
dev_command: pnpm dev
auto_merge: true

# Safety limits (0 = unlimited)
max_issues: 0
max_session_duration: 0
max_test_retries: 3

# Coding harnesses to sync skills/agents to (auto-derived from agent if empty)
harnesses:
  - claude-code

# Per-model pricing (cost per million tokens) for cost tracking
pricing:
  claude-opus-4-6:
    input: 15.0
    output: 75.0
  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
  claude-haiku-4-5:
    input: 0.80
    output: 4.0
  codex-mini:
    input: 1.50
    output: 6.0
