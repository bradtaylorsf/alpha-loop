name: Release

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Determine version from git tags (source of truth) + commit messages
      # This avoids needing to commit version bumps back to master
      - name: Determine version
        id: version
        run: |
          # Get latest tag — this is the source of truth, NOT package.json
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            # First release — use package.json version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=${LAST_TAG#v}
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          COMMITS=$(git log "$LAST_TAG"..HEAD --oneline --format="%s")

          # Skip if no new commits since last tag
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^.*!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          # Compute new version
          NEW_VERSION=$(node -e "
            const [major, minor, patch] = '$CURRENT'.split('.').map(Number);
            const bump = '$BUMP';
            if (bump === 'major') console.log((major+1)+'.0.0');
            else if (bump === 'minor') console.log(major+'.'+(minor+1)+'.0');
            else console.log(major+'.'+minor+'.'+(patch+1));
          ")

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Computed: $CURRENT + $BUMP = $NEW_VERSION"

      # Stamp version into source before building and publishing
      - name: Stamp version
        if: steps.version.outputs.skip != 'true'
        run: |
          NEW_VERSION=${{ steps.version.outputs.new_version }}

          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          sed -i "s/.version('[^']*')/.version('$NEW_VERSION')/" src/cli.ts

          # Rebuild with correct version
          pnpm build

      - name: Publish to npm
        if: steps.version.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create tag and release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          # Create and push tag (no commit to master needed)
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

          # Generate release notes from commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
          PREV_TAG=$(git describe --tags --abbrev=0 "$LAST_TAG^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --oneline --format="- %s" | head -20)
          else
            NOTES=$(git log "$PREV_TAG".."$LAST_TAG^" --oneline --format="- %s")
          fi

          gh release create "v$NEW_VERSION" \
            --title "v$NEW_VERSION" \
            --notes "$NOTES" \
            --latest
